general {
    disable_loading_bar = true
    grace = 5
    hide_cursor = false
    no_fade_in = true
    no_fade_out = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 2
    contrast = 1
    brightness = 0.45
    vibrancy = 0.15
    vibrancy_darkness = 0.15
}

input-field {
    monitor =
    size = 280, 56
    outline_thickness = 2

    dots_size = 0.2
    dots_spacing = 0.25
    dots_center = true

    outer_color = rgba(90, 180, 255, 0.45)
    inner_color = rgba(10, 18, 30, 0.55)
    font_color = rgb(235, 240, 255)

    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 14
    check_color = rgb(90, 180, 255)
    fail_color = rgb(255, 120, 120)

    position = 0, -150
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size = 82
    font_family = JetBrains Mono ExtraBold
    color = rgba(235, 240, 255, 0.92)

    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %d %B %Y')"
    font_size = 22
    font_family = JetBrains Mono
    color = rgba(190, 210, 235, 0.78)

    position = 0, 115
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:5000] echo "Hi there, $(whoami)"
    font_size = 16
    font_family = JetBrains Mono
    color = rgba(160, 190, 225, 0.72)

    position = 0, -98
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(/home/cobi/.config/hypr/scripts/random-quote.sh)"
    font_size = 18
    font_family = JetBrains Mono
    color = rgba(150, 185, 220, 0.70)

    position = 0, 18
    halign = center
    valign = bottom
}
