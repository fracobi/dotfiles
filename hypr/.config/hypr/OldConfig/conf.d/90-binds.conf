bind = $mainMod SHIFT, M, exec, hyprlock

#Main
bind = $mainMod, B, exec, $browser
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Y, exec, kitty --title spf -e spf

#Window manipulation
bind = $mainMod, mouse:274, killactive
bind = $mainMod, A, killactive
bind = $mainMod, M, fullscreen, 1
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, V, togglefloating
bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod SHIFT, down, swapwindow, d

#bind = $mainMod, SPACE, exec, $menu
#bind = $mainMod, C, exec, ~/clipryx/publish/clipryx
#bind = $mainMod SHIFT, C, exec, ~/.config/hypr/scripts/clipboard.sh

#Dashboard
bind = $mainMod, D, exec, ~/.config/eww/toggle-dashboard.sh
bind = $mainMod, escape, exec, ~/.config/eww/close-dashboard.sh
#bind = $mainMod, N, exec, swaync-client -t

#Workspace navigation
bind = $mainMod CTRL, right, workspace, e+1
bind = $mainMod CTRL, left, workspace, e-1
bind = $mainMod, P, pseudo
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, TAB, exec, qs ipc -c overview call overview toggle

#Noctalia
bind  =  $mainMod, SPACE, exec, qs -c noctalia-shell ipc call launcher toggle
bindr = $mainMod, C, exec, qs -c noctalia-shell ipc call plugin:clipboard toggle
bindr = $mainMod SHIFT, C, exec, qs -c noctalia-shell ipc call plugin:clipboard wipe
bind= $mainMod, N, exec, qs -c noctalia-shell ipc call controlCenter toggle
bind= $mainMod SHIFT, N, exec, qs -c noctalia-shell ipc call settings toggle
bind= $mainMod, I, exec, qs -c noctalia-shell ipc call wallpaper toggle
bind= $mainMod, Delete, exec, qs -c noctalia-shell ipc call sessionMenu toggle

#Grouping
bind = $mainMod, G, togglegroup
bind = ALT, TAB, changegroupactive, f
bind = ALT SHIFT, TAB, changegroupactive, b
bind = $mainMod SHIFT, G, togglegroup

#WebPages
bind = $mainMod, L, exec, ~/.config/hypr/scripts/open-url-smart.sh "https://chatgpt.com"
bind = $mainMod, T, exec, ~/.config/hypr/scripts/open-url-smart.sh "https://www.youtube.com"

#Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspace con numpad
bind = $mainMod, code:87, workspace, 1
bind = $mainMod, code:88, workspace, 2
bind = $mainMod, code:89, workspace, 3
bind = $mainMod, code:83, workspace, 4
bind = $mainMod, code:84, workspace, 5
bind = $mainMod, code:85, workspace, 6
bind = $mainMod, code:79, workspace, 7
bind = $mainMod, code:80, workspace, 8
bind = $mainMod, code:81, workspace, 9
bind = $mainMod, code:90, workspace, 10
#Normal Number Key
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
# Workspace monitor virtuale WINSCREEN
bind = SUPER CTRL, 1, workspace, 11
bind = SUPER CTRL, 2, workspace, 12
bind = SUPER CTRL, 3, workspace, 13
bind = SUPER CTRL, 4, workspace, 14
bind = SUPER CTRL, 5, workspace, 15
bind = SUPER CTRL, code:87, workspace, 11
bind = SUPER CTRL, code:88, workspace, 12
bind = SUPER CTRL, code:89, workspace, 13
bind = SUPER CTRL, code:83, workspace, 14
bind = SUPER CTRL, code:84, workspace, 15

# Sposta finestra su workspace con numpad
bind = $mainMod SHIFT, code:87, movetoworkspace, 1
bind = $mainMod SHIFT, code:88, movetoworkspace, 2
bind = $mainMod SHIFT, code:89, movetoworkspace, 3
bind = $mainMod SHIFT, code:83, movetoworkspace, 4
bind = $mainMod SHIFT, code:84, movetoworkspace, 5
bind = $mainMod SHIFT, code:85, movetoworkspace, 6
bind = $mainMod SHIFT, code:79, movetoworkspace, 7
bind = $mainMod SHIFT, code:80, movetoworkspace, 8
bind = $mainMod SHIFT, code:81, movetoworkspace, 9
bind = $mainMod SHIFT, code:90, movetoworkspace, 10
#Normal Number Key
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
# Spostare finestra attiva sui workspace virtuali
bind = SUPER CTRL ALT, 1, movetoworkspace, 11
bind = SUPER CTRL ALT, 2, movetoworkspace, 12
bind = SUPER CTRL ALT, 3, movetoworkspace, 13
bind = SUPER CTRL ALT, 4, movetoworkspace, 14
bind = SUPER CTRL ALT, 5, movetoworkspace, 15
bind = SUPER CTRL ALT, code:87, movetoworkspace, 11
bind = SUPER CTRL ALT, code:88, movetoworkspace, 12
bind = SUPER CTRL ALT, code:89, movetoworkspace, 13
bind = SUPER CTRL ALT, code:83, movetoworkspace, 14
bind = SUPER CTRL ALT, code:84, movetoworkspace, 15


bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

#ScreenShot
bind = $mainMod, S, exec, /home/cobi/.local/bin/hyprshot -m region --clipboard-only
bind = $mainMod SHIFT, S, exec, /home/cobi/.local/bin/hyprshot -m region -o /home/cobi/Immagini/Schermate
bind = $mainMod SHIFT, W, exec, /home/cobi/.local/bin/hyprshot -m window
bind = , Print, exec, /home/cobi/.local/bin/hyprshot -m output -o /home/cobi/Immagini/Schermate
